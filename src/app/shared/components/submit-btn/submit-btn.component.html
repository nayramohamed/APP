<button
  [disabled]="isSubmittingForm()"
  type="submit"
  class="inline-flex h-12 w-full items-center justify-center gap-2 rounded-md bg-primary-600 px-4 text-sm font-bold text-white transition hover:bg-primary-700 disabled:opacity-50 disabled:cursor-not-allowed cursor-pointer"
>
  @if (isSubmittingForm()) {
    <i class="fas fa-spinner fa-spin"></i>
    {{ textOnSubmit() }}
  } @else {
    {{ text() }}
  }
</button>
