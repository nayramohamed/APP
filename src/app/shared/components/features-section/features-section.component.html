<section class="py-6 bg-primary-50 border-y border-primary-100">
  <div class="md:container mx-auto px-4">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
      @for (feature of features; track feature.id) {
        <div
          class="flex items-center gap-4 p-4 rounded-lg border border-gray-100 transition-shadow"
        >
          <div>
            <div
              class="flex items-center justify-center size-12 rounded-xl bg-primary-100 *:text-primary-600"
            >
              <app-icon [name]="feature.icon" color="text-primary-600"></app-icon>
            </div>
          </div>
          <div class="flex-1 min-w-0">
            <h3 class="text-sm font-semibold text-gray-900">{{ feature.titleKey | translate }}</h3>
            <p class="text-xs text-gray-600 mt-1">{{ feature.descriptionKey | translate }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
