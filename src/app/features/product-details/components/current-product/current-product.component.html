@if (isLoading()) {
  <app-current-product-skeleton></app-current-product-skeleton>
} @else {
  <section class="container mx-auto px-4 py-8">
    <nav class="text-sm *:transition my-4 pb-4">
      <a routerLink="" class="cursor-pointer hover:text-primary-600 text-gray-500"
        ><i class="fas fa-home mr-1 text-xs"></i> {{ 'breadcrumb.home' | translate }}</a
      >
      <i class="fas fa-chevron-right text-[11px] text-gray-400 mx-2"></i>
      <a
        [routerLink]="['/categories/', product()?.category?._id]"
        class="cursor-pointer hover:text-primary-600 text-gray-500"
        >{{ product()?.category?.name }}</a
      >
      <i class="fas fa-chevron-right text-[11px] text-gray-400 mx-2"></i>
      <a
        [routerLink]="['/products/']"
        [queryParams]="{ subcategory: product()?.subcategory?.[0]?._id }"
        class="cursor-pointer hover:text-primary-600 text-gray-500"
        >{{ product()?.subcategory?.at(0)?.name }}</a
      >
      <i class="fas fa-chevron-right text-[11px] text-gray-400 mx-2"></i>
      <span class="text-gray-900 font-medium truncate max-w-xs">{{ product()?.title }}</span>
    </nav>
    <div>
      <div class="grid grid-cols-1 md:grid-cols-12 gap-10">
        <div class="md:col-span-3">
          <app-product-images-slider [product]="product()"></app-product-images-slider>
        </div>
        <div class="md:col-span-9">
          <app-product-information
            [reviewsCount]="reviewsCount()"
            [product]="product()"
          ></app-product-information>
        </div>
      </div>
    </div>
  </section>
}
