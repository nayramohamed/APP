<section class="py-10">
  <div class="container mx-auto mb-6">
    <div class="flex items-center justify-between mb-6">
      <app-section-header
        class="*:text-2xl"
        [primaryText]="'productDetails.youMayAlsoLike.primary' | translate"
        [highlightedText]="'productDetails.youMayAlsoLike.highlighted' | translate"
      ></app-section-header>
      <div class="flex items-center gap-2 rtl:flex-row-reverse">
        <button
          (click)="prevProduct()"
          class="prev-btn size-10 flex items-center justify-center bg-gray-100 rounded-full text-gray-600 hover:bg-primary-100 hover:text-primary-600 transition cursor-pointer"
        >
          <i class="fas fa-chevron-left text-xl"></i>
        </button>
        <button
          (click)="nextProduct()"
          class="prev-btn size-10 flex items-center justify-center bg-gray-100 rounded-full text-gray-600 hover:bg-primary-100 hover:text-primary-600 transition cursor-pointer"
        >
          <i class="fas fa-chevron-right text-xl"></i>
        </button>
      </div>
    </div>
    <div>
      <swiper-container
        #swiperRef
        loop="false"
        navigation="false"
        space-between="15"
        [breakpoints]="breakpointsConfig"
      >
        @for (product of products(); track product.id) {
          <swiper-slide>
            <app-product-card
              [product]="product"
              [isAddedToWishlist]="InWishListSet().has(product._id)"
            ></app-product-card>
          </swiper-slide>
        }
      </swiper-container>
    </div>
  </div>
</section>
