<div class="bg-white border border-gray-100 rounded-xl p-4 space-y-3 mt-3">
  <!-- Header -->
  <div class="flex items-start justify-between gap-3">
    <!-- Avatar + Name -->
    <div class="flex items-center gap-3">
      <div
        class="w-10 h-10 rounded-full bg-primary-50 text-primary-600 text-sm font-medium flex items-center justify-center"
      >
        {{ getFirstLetters(review().user.name) }}
      </div>
      <div>
        <p class="text-sm font-medium text-gray-800">{{ review().user.name }}</p>
        <p class="text-xs text-gray-400">{{ review().createdAt | date: 'MMMM d, y' }}</p>
      </div>
    </div>

    <!-- Stars -->
    <div class="flex gap-0.5 pt-1">
      @for (star of stars; track star) {
        <i
          class="fa-star text-sm"
          [class.fa-solid]="star <= review()!.rating"
          [class.fa-regular]="star > review()!.rating"
          [class.text-amber-400]="star <= review()!.rating"
          [class.text-gray-300]="star > review()!.rating"
        >
        </i>
      }
    </div>
  </div>

  <p class="text-sm text-gray-500 leading-relaxed">{{ review().review }}</p>
  @if (isReviewOwner()) {
    <div class="border-t border-gray-100 pt-3 flex items-center gap-2">
      <button
        (click)="deleteReview()"
        [disabled]="isDeleting()"
        class="text-xs text-gray-400 border border-gray-200 rounded-lg px-4 py-1.5 hover:bg-red-50 hover:text-red-400 hover:border-red-200 transition-colors disabled:cursor-not-allowed disabled:opacity-60 cursor-pointer"
      >
        @if (isDeleting()) {
          {{ 'reviews.deleting' | translate }}
        } @else {
          {{ 'reviews.delete' | translate }}
        }
      </button>
    </div>
  }
</div>
