<button
  [routerLink]="['/products/']"
  [queryParams]="{ subcategory: subcategory()?._id }"
  type="button"
  class="bg-white border border-gray-100 rounded-xl gap-3 shadow-sm hover:shadow-md transition-all cursor-pointer p-6 group hover:-translate-y-1 duration-300 hover:border-primary-200 w-full"
>
  <div
    class="size-14 p-6 overflow-hidden rounded-xl bg-primary-50 text-slate-600 group-hover:bg-primary-100 transition-all flex items-center justify-center mb-3"
  >
    <i class="fas fa-folder-open text-2xl text-primary-600"></i>
  </div>

  <div class="text-start">
    <h3 class="font-bold text-gray-900 text-lg group-hover:text-primary-600 transition-colors mb-2">
      {{ subcategory()?.name }}
    </h3>
    <div
      class="flex items-center gap-2 invisible group-hover:visible transition-all text-primary-600 text-xs"
    >
      <span>{{ 'categoryDetails.browseProducts' | translate }}</span>
      <i class="fas fa-arrow-right"></i>
    </div>
  </div>
</button>
