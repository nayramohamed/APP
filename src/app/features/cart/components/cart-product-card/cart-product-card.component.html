<div class="relative rounded-xl border border-gray-100 bg-white p-6 shadow-sm mb-4 overflow-hidden">
  @if (isUpdating()) {
    <div class="absolute inset-0 opacity-90 bg-white flex items-center justify-center">
      <div class="text-center">
        <i class="fas fa-spinner fa-spin text-2xl text-primary-600"></i>
        <p>Updating...</p>
      </div>
    </div>
  }

  <div class="flex flex-col gap-4 sm:flex-row sm:items-center lg:col-span-2">
    <img
      [src]="product()?.product?.imageCover"
      alt="Woman Standart Fit Knitted Cardigan"
      class="h-28 w-28 flex-none rounded-xl object-cover"
    />

    <div class="flex flex-1 flex-col gap-4 sm:ml-6">
      <div class="flex flex-col gap-2 sm:flex-row sm:items-start sm:justify-between">
        <div>
          <h2 class="text-lg font-semibold text-slate-900 hover:text-primary-600 transition-all">
            <a [routerLink]="['/products/', product()?.product?._id]">
              {{ product()?.product?.title }}
            </a>
          </h2>
          <span
            class="inline-flex items-center rounded-full bg-emerald-50 px-3 py-1 text-xs font-medium text-primary-700 mt-2"
          >
            {{ product()?.product?.category?.name }}
          </span>
        </div>
      </div>
      <span class="text-primary-600 font-bold text-lg">{{ product()?.price }} EGP</span>

      <div class="flex flex-col items-start gap-4 sm:flex-row sm:items-center sm:justify-between">
        <div class="flex items-center gap-2 rounded-xl bg-gray-50 border border-slate-200 p-1">
          <button
            [disabled]="currentCount() <= 1"
            (click)="updateQuantity(-1)"
            type="button"
            class="size-8 rounded-lg border border-slate-200 transition hover:bg-slate-50 cursor-pointer bg-white disabled:border-0 disabled:cursor-not-allowed disabled:opacity-40"
          >
            <i class="fas fa-minus text-gray-300 text-sm"></i>
          </button>
          <span class="w-10 text-center text-lg font-semibold text-slate-900">
            {{ product()?.count }}</span
          >
          <button
            (click)="updateQuantity(1)"
            type="button"
            class="h-8 w-8 rounded-lg border border-slate-200 bg-primary-600 text-white transition hover:bg-primary-700 cursor-pointer"
          >
            <i class="fas fa-plus text-sm"></i>
          </button>
        </div>

        <div class="flex items-start gap-2 sm:items-end">
          <div>
            <p class="text-xs text-gray-500 mb-0.5 text-end">Total</p>
            <div class="flex items-center gap-2">
              <p class="text-lg font-semibold text-slate-900">
                {{ totalPrice() }}
              </p>
              <p class="text-xs text-gray-500">EGP</p>
            </div>
          </div>

          <div></div>

          <button
            (click)="showRemoveDialog()"
            type="button"
            class="inline-flex h-10 w-10 items-center justify-center rounded-xl bg-red-50 border border-red-200 text-red-500 transition hover:bg-red-500 hover:text-white cursor-pointer"
            aria-label="Remove item"
          >
            <i class="fas fa-trash-alt"></i>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
