<div
  class="bg-white rounded-2xl border border-gray-100 p-5 shadow-sm hover:shadow-md hover:border-primary-100 transition-all duration-200 group mb-2"
>
  <div class="flex items-start justify-between gap-4">
    <div class="flex items-start gap-4 flex-1">
      <div
        class="w-11 h-11 rounded-xl bg-primary-50 flex items-center justify-center shrink-0 group-hover:bg-primary-100 transition-colors"
      >
        <i class="fas fa-location-dot text-lg text-primary-600"></i>
      </div>

      <div class="flex-1 min-w-0">
        <h3 class="font-bold text-gray-900 mb-1">{{ address()?.name }}</h3>
        <p class="text-sm text-gray-600 mb-3 line-clamp-2">{{ address()?.details }}</p>

        <div class="flex flex-wrap items-center gap-4 text-sm text-gray-500">
          <span class="flex items-center gap-1.5">
            <i class="fas fa-phone text-xs"></i>
            {{ address()?.phone }}
          </span>

          <span class="flex items-center gap-1.5">
            <i class="fas fa-city text-xs"></i>
            {{ address()?.city }}
          </span>
        </div>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <button
        (click)="onOpenEditForm()"
        class="w-9 h-9 rounded-lg bg-gray-100 text-gray-600 hover:bg-primary-100 hover:text-primary-600 flex items-center justify-center transition-colors cursor-pointer"
        title="Edit address"
      >
        <i class="fas fa-pen text-sm"></i>
      </button>

      <button
        (click)="showRemoveDialog()"
        class="w-9 h-9 rounded-lg bg-gray-100 text-gray-600 hover:bg-red-100 hover:text-red-600 flex items-center justify-center transition-colors disabled:opacity-50 cursor-pointer"
        title="Delete address"
      >
        <i class="fas fa-trash text-sm"></i>
      </button>
    </div>
  </div>
</div>
