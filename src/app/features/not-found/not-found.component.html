<section class="relative min-h-[75vh] overflow-hidden bg-[#F4F6F8] py-10 md:py-16">
  <span
    class="pointer-events-none absolute left-[5%] top-[6%] text-[1.9rem] text-primary-200 animate-[float_6s_ease-in-out_infinite]]"
  >
    <i class="fas fa-apple-whole"></i>
  </span>
  <span class="pointer-events-none absolute right-[8%] top-[18%] text-3xl text-[#7DE8A4]/50">
    <i class="fas fa-carrot"></i>
  </span>
  <span
    class="pointer-events-none absolute right-[6%] top-[45%] text-2xl animate-[float_6s_ease-in-out_infinite_0.8s] text-[#7DE8A4]/50"
  >
    <i class="fas fa-carrot"></i>
  </span>
  <span class="pointer-events-none absolute left-[14%] top-[56%] text-[1.25rem] text-primary-100">
    <i class="fas fa-apple-whole -rotate-18"></i>
  </span>
  <span
    class="pointer-events-none absolute bottom-[15%] left-[6%] text-[1.55rem] text-[#7DE8A4]/50"
  >
    <i class="fas fa-lemon -rotat"></i>
  </span>
  <span
    class="pointer-events-none absolute bottom-[8%] right-[16%] text-[1.9rem] text-[#7DE8A4]/50"
  >
    <i class="fas fa-seedling"></i>
  </span>

  <div
    class="mx-auto flex min-h-[65vh] max-w-4xl flex-col items-center justify-center px-4 text-center"
  >
    <div class="relative mb-6">
      <div
        class="grid h-43.5 w-59.5 place-items-center rounded-3xl border border-white bg-white/70 shadow-xl backdrop-blur-sm"
      >
        <i class="fas fa-shopping-cart text-5xl text-[#66D795]" aria-hidden="true"></i>
      </div>
      <div
        class="absolute -right-4 -top-3 grid w-64 h-52 sm:w-72 sm:h-60 -z-10 bg-primary-100/50 rounded-[32px] blur-2xl"
      >
        404
      </div>
    </div>

    <div class="mb-6 inline-flex items-center gap-3" aria-hidden="true">
      <span class="h-2.5 w-2.5 rounded-full bg-primary-400"></span>
      <span class="text-2xl border-b-[3px] rounded-b-full w-8 h-4 border-primary-400"></span>
      <span class="h-2.5 w-2.5 rounded-full bg-primary-400"></span>
    </div>

    <h1 class="mb-2 text-4xl sm:text-5xl font-black tracking-tight text-gray-900">
      {{ 'notFound.title' | translate }}
    </h1>
    <p class="max-w-2xl text-lg font-semibold leading-8 text-gray-500 max-w-md">
      {{ 'notFound.subtitle' | translate }}
    </p>

    <div class="mt-8 flex flex-wrap items-center justify-center gap-3 md:gap-4">
      <a
        routerLink="/home"
        class="inline-flex items-center gap-2 rounded-2xl bg-primary-600 hover:bg-primary-700 px-8 py-4 text-lg font-bold text-white shadow-lg shadow-primary-600/25 transition-all duration-300 hover:shadow-xl hover:shadow-primary-600/30 hover:-translate-y-1"
      >
        <i class="fas fa-house text-base" aria-hidden="true"></i>
        {{ 'notFound.goToHomepage' | translate }}
      </a>
      <button
        type="button"
        (click)="goBack()"
        class="inline-flex items-center gap-2 rounded-2xl border border-[#D5DAE2] bg-white px-8 py-4 text-lg font-bold text-[#505B70] shadow-[0_8px_16px_rgba(29,38,52,.08)] transition hover:-translate-y-0.5 hover:bg-[#F7F8FA]"
      >
        <i class="fas fa-arrow-left text-base" aria-hidden="true"></i>
        {{ 'notFound.goBack' | translate }}
      </button>
    </div>

    <div
      class="mt-12 w-full max-w-3xl rounded-3xl border border-[#E1E5EB] bg-[#F7F8FA] p-6 shadow-[0_16px_24px_rgba(44,58,76,.06)]"
    >
      <p class="mb-3 text-xs font-extrabold uppercase tracking-[0.18em] text-[#A0AABC]">
        {{ 'notFound.popularDestinations' | translate }}
      </p>
      <div class="flex flex-wrap items-center justify-center gap-3">
        @for (item of destinations; track item.label) {
          <a
            [routerLink]="item.route"
            [class]="
              item.label === 'All Products'
                ? 'rounded-xl bg-[#E4F8ED] px-5 py-2.5 text-sm font-bold text-[#33A965] hover:bg-primary-100 shadow-[inset_0_0_0_1px_#C7F0D8]'
                : 'rounded-xl bg-[#ECEFF3] px-5 py-2.5 text-sm font-bold text-[#6D7789]'
            "
            class="transition hover:-translate-y-0.5 hover:bg-white hover:text-[#2C3446]"
          >
            {{ item.label }}
          </a>
        }
      </div>
    </div>
  </div>
</section>
<app-features-section></app-features-section>
