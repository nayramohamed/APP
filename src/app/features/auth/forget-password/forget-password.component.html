<section class="px-4 py-16">
  <div class="mx-auto grid w-full max-w-7xl grid-cols-1 gap-12 lg:grid-cols-2 items-center">
    <div class="hidden lg:block">
      <div
        class="rounded-2xl bg-[#f7faf8] shadow-lg bg-linear-to-br from-primary-50 via-green-50 to-emerald-50"
      >
        <div
          class="relative mx-auto flex h-96 w-full max-w-2xl items-center justify-center overflow-hidden rounded-2xl bg-primary-50"
        >
          <span class="absolute left-10 top-8 size-24 rounded-full bg-primary-100/50"></span>
          <span class="absolute right-18 top-20 size-16 rounded-full bg-emerald-100/50"></span>
          <span class="absolute bottom-10 right-8 size-32 rounded-full bg-green-100/50"></span>

          <div class="flex flex-col gap-6 items-center">
            <div class="relative flex items-center gap-4">
              <div class="-rotate-12 rounded-2xl bg-white p-4 shadow-md text-primary-600">
                <i class="fas fa-envelope" aria-hidden="true"></i>
              </div>

              <div class="rounded-3xl bg-white p-4 shadow-md">
                <div class="rounded-2xl bg-primary-100 p-4">
                  <i class="fas fa-lock text-3xl text-primary-600" aria-hidden="true"></i>
                </div>
              </div>

              <div class="rotate-12 rounded-2xl bg-white p-4 shadow-md text-primary-600">
                <i class="fas fa-shield-alt" aria-hidden="true"></i>
              </div>
            </div>

            <div class="flex items-center gap-2">
              <span class="size-3 rounded-full bg-primary-400 animate-pulse"></span>
              <span class="size-3 rounded-full bg-primary-500 animate-pulse delay-150"></span>
              <span class="size-3 rounded-full bg-primary-600 animate-pulse delay-300"></span>
            </div>
          </div>
        </div>
      </div>

      <div class="mx-auto mt-6 max-w-2xl text-center">
        <h1 class="text-3xl font-bold text-slate-900">
          {{ 'resetPassword.title' | translate }}
        </h1>

        <p class="mt-4 text-lg text-slate-700">
          {{ 'resetPassword.description' | translate }}
        </p>

        <div class="mt-4 flex flex-wrap items-center justify-center gap-8 text-base text-slate-600">
          <span class="inline-flex items-center gap-2 text-sm">
            <i class="fas fa-envelope text-primary-600" aria-hidden="true"></i>
            {{ 'resetPassword.features.email' | translate }}
          </span>

          <span class="inline-flex items-center gap-2 text-sm">
            <i class="fas fa-shield-alt text-primary-600" aria-hidden="true"></i>
            {{ 'resetPassword.features.secure' | translate }}
          </span>

          <span class="inline-flex items-center gap-2 text-sm">
            <i class="fas fa-lock text-primary-600" aria-hidden="true"></i>
            {{ 'resetPassword.features.encrypted' | translate }}
          </span>
        </div>
      </div>
    </div>

    <app-reset-form></app-reset-form>
  </div>
</section>
<app-features-section></app-features-section>
