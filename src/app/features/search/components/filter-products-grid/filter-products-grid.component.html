<div
  [class]="this.isListView() ? 'space-y-4' : 'grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4'"
  class="grid"
>
  @for (product of products(); track product._id) {
    <app-product-card
      class="*:h-full"
      [product]="product"
      [isAddedToWishlist]="InWishListSet().has(product._id)"
    ></app-product-card>
  }
</div>
