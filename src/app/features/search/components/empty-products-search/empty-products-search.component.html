<div class="flex flex-col items-center justify-center py-24 text-center">
  <div class="w-20 h-20 rounded-full bg-gray-100 flex items-center justify-center mx-auto mb-5">
    <i class="fas fa-search text-2xl text-gray-400"></i>
  </div>
  <h2 class="text-lg font-semibold text-gray-800 mb-1.5">
    {{ 'search.noProductsFound' | translate }}
  </h2>
  <p class="text-sm text-gray-400 mb-7 max-w-xs leading-relaxed">
    {{ 'search.noProductsSubtitle' | translate }}
  </p>
  <button
    (click)="clearAllFilters()"
    class="bg-primary-600 hover:bg-primary-700 active:scale-95 transition-all text-white text-sm font-semibold px-8 py-2.5 rounded-xl shadow-sm flex items-center gap-2 cursor-pointer"
  >
    {{ 'search.clearFilters' | translate }}
  </button>
</div>
