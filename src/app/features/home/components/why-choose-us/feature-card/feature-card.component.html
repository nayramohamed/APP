<div
  [class]="loaded() ? 'animate-fade-in-up' : 'opacity-0'"
  class="group flex items-center gap-4 rounded-2xl border border-slate-200/90 bg-white px-5 py-4 transition-all duration-200 shadow-sm hover:shadow-md"
>
  <div
    [class]="bgColor()"
    class="flex h-12 w-12 shrink-0 items-center justify-center rounded-full transition-colors duration-200"
  >
    <app-icon [name]="iconName()" [color]="iconColor()"></app-icon>
  </div>
  <div class="space-y-0.5">
    <h3 class="text-sm font-semibold text-slate-800">{{ title() }}</h3>
    <p class="text-xs text-slate-500">{{ description() }}</p>
  </div>
</div>
