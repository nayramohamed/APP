<section class="py-10">
  <div class="container mx-auto px-4">
    <div class="py-10">
      <div class="flex items-center justify-between gap-3 mb-8">
        <app-section-header
          [primaryText]="'home.shopbycategory.shopBy' | translate"
          [highlightedText]="'home.shopbycategory.category' | translate"
        ></app-section-header>

        <a
          routerLink="/categories"
          class="hidden md:inline-flex items-center gap-2 text-primary-600 font-medium hover:text-primary-700 transition-colors"
        >
          {{ 'home.shopbycategory.viewAll' | translate }}
          <i dir="ltr" class="fas fa-arrow-right text-sm"></i>
        </a>
      </div>

      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-4">
        @for (category of categories(); track category._id) {
          <app-category-card [category]="category"></app-category-card>
        }
      </div>
    </div>

    <div class="grid md:grid-cols-2 gap-5 px-8 py-10">
      @for (promoCard of promos; track promoCard.id) {
        <app-promo-card [promoCard]="promoCard"></app-promo-card>
      }
    </div>
  </div>
</section>
