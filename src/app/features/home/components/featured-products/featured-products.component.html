@if (products() && products()!.length > 0) {
  <section class="py-10">
    <div class="container mx-auto">
      <div class="px-8">
        <div class="my-8">
          <app-section-header
            [primaryText]="'home.featuredProducts.primary' | translate"
            [highlightedText]="'home.featuredProducts.highlighted' | translate"
          ></app-section-header>
        </div>
        <div
          class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6"
        >
          @for (product of products()!; track product._id) {
            <app-product-card
              [product]="product"
              [isAddedToWishlist]="InWishListSet().has(product._id)"
            ></app-product-card>
          }
        </div>
      </div>
    </div>
  </section>
}
