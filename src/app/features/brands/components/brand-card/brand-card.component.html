<button
  [routerLink]="['/products/']"
  [queryParams]="{ brand: brand()?._id }"
  type="button"
  class="bg-white border border-gray-100 rounded-xl justify-center gap-3 shadow-sm hover:shadow-md transition-all cursor-pointer p-6 group hover:-translate-y-1 duration-300 hover:border-violet-200"
>
  <div
    class="p-6 mx-auto overflow-hidden rounded-xl bg-slate-100 text-slate-600 transition-all flex items-center justify-center mb-3"
  >
    <img
      [src]="brand()?.image"
      [alt]="brand()?.name"
      class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
    />
  </div>

  <h3
    class="font-medium text=sm text-gray-900 text-center group-hover:text-violet-600 transition-colors"
  >
    {{ brand()?.name }}
  </h3>
  <div
    class="flex items-center justify-center gap-2 invisible group-hover:visible transition-all text-violet-600 text-xs"
  >
    <span>{{ 'brands.viewProducts' | translate }}</span>
    <i class="fas fa-arrow-right"></i>
  </div>
</button>
